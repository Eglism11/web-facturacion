{% extends 'base.html' %}

{% block title %}Nuevo Cliente - Facturación{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <!-- Header -->
    <div class="mb-6">
        <a href="{{ url_for('listar_clientes') }}" class="text-sm text-gray-500 hover:text-gray-700">
            ← Volver a clientes
        </a>
        <h2 class="mt-2 text-2xl font-bold text-gray-900">Nuevo Cliente</h2>
        <p class="mt-1 text-sm text-gray-500">Completa la información del cliente</p>
    </div>

    <!-- Form -->
    <div class="bg-white shadow rounded-lg">
        <form method="POST" class="p-6 space-y-6">

            <!-- Nombre (required) -->
            <div>
                <label for="nombre" class="block text-sm font-medium text-gray-700">
                    Nombre completo *
                </label>
                <input type="text" name="nombre" id="nombre" required
                       class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                       placeholder="Ej: Juan Pérez">
            </div>

            <!-- Email -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">
                    Email
                </label>
                <input type="email" name="email" id="email"
                       class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                       placeholder="cliente@ejemplo.com">
            </div>

            <!-- Teléfono -->
            <div>
                <label for="telefono" class="block text-sm font-medium text-gray-700">
                    Teléfono
                </label>
                <input type="tel" name="telefono" id="telefono"
                       class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                       placeholder="555-123-4567">
            </div>

            <!-- Identificación -->
            <div>
                <label for="identificacion" class="block text-sm font-medium text-gray-700">
                    ID / Documento
                </label>
                <input type="text" name="identificacion" id="identificacion"
                       class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                       placeholder="RFC, NIT, etc.">
            </div>

            <!-- Actions -->
            <div class="flex justify-end space-x-3 pt-4 border-t">
                <a href="{{ url_for('listar_clientes') }}" class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                    Cancelar
                </a>
                <button type="submit" class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700">
                    Guardar Cliente
                </button>
            </div>

        </form>
    </div>
</div>
{% endblock %}
