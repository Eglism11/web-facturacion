{% extends 'base.html' %}

{% block title %}Editar {{ cliente.nombre }} - Facturación{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-8 fade-in">
    <div class="page-header">
        <a href="{{ url_for('ver_cliente', id=cliente.id) }}" class="inline-flex items-center text-sm text-gray-500 hover:text-primary-600 mb-4 font-medium">
            <i class="fas fa-arrow-left mr-2"></i>Volver al cliente
        </a>
        <div class="flex items-center space-x-4">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center shadow-lg shadow-blue-500/30">
                <i class="fas fa-edit text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Editar Cliente</h1>
                <p class="text-gray-500 font-medium">Actualiza la información de {{ cliente.nombre }}</p>
            </div>
        </div>
    </div>

    <div class="glass-card rounded-2xl p-6 sm:p-8 slide-up">
        <form method="POST" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2 md:col-span-2">
                    <label for="nombre" class="block text-sm font-semibold text-gray-700">
                        Nombre completo <span class="text-red-500">*</span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input type="text" name="nombre" id="nombre" required value="{{ cliente.nombre }}"
                               class="input-field w-full pl-12 pr-4 py-3.5 bg-gray-50 text-gray-900">
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="email" class="block text-sm font-semibold text-gray-700">
                        Email
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-400"></i>
                        </div>
                        <input type="email" name="email" id="email" value="{{ cliente.email or '' }}"
                               class="input-field w-full pl-12 pr-4 py-3.5 bg-gray-50 text-gray-900"
                               placeholder="cliente@ejemplo.com">
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="telefono" class="block text-sm font-semibold text-gray-700">
                        Teléfono
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-phone text-gray-400"></i>
                        </div>
                        <input type="tel" name="telefono" id="telefono" value="{{ cliente.telefono or '' }}"
                               class="input-field w-full pl-12 pr-4 py-3.5 bg-gray-50 text-gray-900"
                               placeholder="300 123 4567">
                    </div>
                </div>

                <div class="space-y-2 md:col-span-2">
                    <label for="identificacion" class="block text-sm font-semibold text-gray-700">
                        ID / Documento
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-id-card text-gray-400"></i>
                        </div>
                        <input type="text" name="identificacion" id="identificacion" value="{{ cliente.identificacion or '' }}"
                               class="input-field w-full pl-12 pr-4 py-3.5 bg-gray-50 text-gray-900"
                               placeholder="Cédula, NIT, C.E.">
                    </div>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row items-center justify-end gap-3 pt-6 border-t border-slate-100">
                <a href="{{ url_for('ver_cliente', id=cliente.id) }}" class="btn-secondary w-full sm:w-auto inline-flex items-center justify-center px-5 py-3 text-gray-700 font-semibold text-sm">
                    <i class="fas fa-times mr-2"></i>Cancelar
                </a>
                <button type="submit" class="btn-primary w-full sm:w-auto inline-flex items-center justify-center px-6 py-3 text-white font-semibold text-sm">
                    <i class="fas fa-save mr-2"></i>Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
