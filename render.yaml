services:
  - type: web
    name: facturacion-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false  # This will be set in Render dashboard
      - key: SECRET_KEY
        generateValue: true
    autoDeploy: true
